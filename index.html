<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista Viva</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      transition: background-color 0.4s, color 0.4s;
      min-height: 100vh;
    }

    .dark-mode {
      background-color: #121212 !important;
      color: #f1f1f1 !important;
    }

    .light-mode {
      background-color: #f9f9f9 !important;
      color: #222 !important;
    }

    #mensagem {
      min-height: 30px;
      font-weight: bold;
      transition: opacity 0.3s;
    }

    .btn-remover {
      float: right;
      font-size: 0.85rem;
    }

    /* Animações */
    .fade-in {
      animation: fadeIn 0.4s forwards;
    }

    .fade-out {
      animation: fadeOut 0.4s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-10px); height: 0; margin: 0; padding: 0; }
    }
  </style>
</head>
<body class="light-mode">

  <div class="container py-5 text-center">

    <h1 class="mb-4">Lista Viva</h1>

    
    <div class="input-group mb-3 justify-content-center">
      <input type="text" id="nomeUsuario" class="form-control w-50" placeholder="Digite seu nome">
      <button id="enviarNome" class="btn btn-primary">Enviar</button>
    </div>

    <p id="mensagem"></p>

    <p id="contador" class="fw-bold"></p>

    
    <ul id="listaNomes" class="list-group list-group-flush w-50 mx-auto text-start mb-3"></ul>

    
      <button id="limparLista" class="btn btn-danger me-2">Limpar Lista</button>
      <button id="toggleModo" class="btn btn-success">Alternar Modo Claro/Escuro</button>
    </div>

  </div>

  
 <script src="scritp.js"></script>

</body>
</html>
